name: Release APK

# Two entry points:
#  • Manual — Actions → "Release APK" → "Run workflow", enter a version string.
#  • Reusable — called by auto-release.yml on every push to main, which computes
#    the next patch version and passes it in (workflow_call).
# Both build the APK/AAB and create a GitHub Release for the given version.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.2.0)"
        required: true
        type: string
      pre_release:
        description: "Mark as pre-release"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  workflow_call:
    inputs:
      version:
        description: "Release version (e.g. 1.2.0)"
        required: true
        type: string
      pre_release:
        description: "Mark as pre-release"
        required: false
        default: "false"
        type: string

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# ── Job 1: Run Rust tests before spending time on the Android build ────────────
jobs:
  test:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - run: cargo test --workspace

# ── Job 2: Cross-compile Rust → Android .so libraries ─────────────────────────
  build-rust:
    name: Build JNI libs (${{ matrix.abi }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - target: aarch64-linux-android
            abi: arm64-v8a
          - target: armv7-linux-androideabi
            abi: armeabi-v7a
          - target: x86_64-linux-android
            abi: x86_64

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust stable + Android target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --locked

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: ndk
        with:
          ndk-version: r27c
          # local-cache:true can report an ndk-path whose toolchain lives one
          # directory deeper (the r27c archive nests), which breaks cargo-ndk's
          # linker lookup. Disable it and resolve the real path below.
          local-cache: false

      - name: Resolve NDK toolchain path
        # cargo-ndk spawns $ANDROID_NDK_HOME/toolchains/llvm/prebuilt/<host>/bin/clang.
        # Confirm clang is actually there; if setup-ndk nested it, locate it and
        # re-point ANDROID_NDK_HOME/ROOT. Fail fast with a clear message otherwise.
        run: |
          set -euo pipefail
          host="linux-x86_64"
          ndk="${{ steps.ndk.outputs.ndk-path }}"
          echo "setup-ndk reported ndk-path: '$ndk'"
          clang="$ndk/toolchains/llvm/prebuilt/$host/bin/clang"
          if [ ! -x "$clang" ]; then
            echo "clang not at '$clang'; searching under '$ndk' …"
            found="$(find "$ndk" -type f -name clang -path "*/prebuilt/$host/bin/clang" 2>/dev/null | head -n1 || true)"
            if [ -z "$found" ]; then
              echo "::error::NDK clang not found under '$ndk' — setup-ndk layout unexpected."
              exit 1
            fi
            ndk="${found%/toolchains/*}"
            echo "resolved real NDK home: '$ndk'"
          fi
          echo "ANDROID_NDK_HOME=$ndk" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk" >> "$GITHUB_ENV"
          echo "Using NDK at: $ndk"

      - name: Build comrade_jni for ${{ matrix.abi }}
        # media-http turns on the real Blossom upload / fetch-and-decrypt pipeline
        # so the shipped APK can actually send and receive attachments.
        run: |
          cargo ndk \
            --target ${{ matrix.target }} \
            --output-dir android/app/src/main/jniLibs \
            -- build --release -p comrade_jni --features media-http

      - name: Upload JNI .so artifact
        uses: actions/upload-artifact@v4
        with:
          name: jniLibs-${{ matrix.abi }}
          # Upload the jniLibs ROOT so the artifact keeps the <abi>/ folder.
          # Uploading .../jniLibs/<abi>/ directly strips the ABI directory and
          # the merged download then puts every .so flat into jniLibs/, which
          # AGP rejects ("... is not an ABI") at :app:mergeReleaseNativeLibs.
          # Each matrix job builds exactly one target, so the root only
          # contains this job's ABI folder.
          path: android/app/src/main/jniLibs/
          if-no-files-found: error

# ── Job 3: Build the Android APK ──────────────────────────────────────────────
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    needs: build-rust

    steps:
      - uses: actions/checkout@v5

      - name: Download all JNI libs
        uses: actions/download-artifact@v4
        with:
          pattern: jniLibs-*
          merge-multiple: true
          path: android/app/src/main/jniLibs/

      - name: Verify JNI lib layout
        # Fail fast with a readable error if the artifact handoff ever
        # regresses — AGP needs jniLibs/<abi>/libcomrade_jni.so.
        run: |
          ls -R android/app/src/main/jniLibs
          for abi in arm64-v8a armeabi-v7a x86_64; do
            test -f "android/app/src/main/jniLibs/$abi/libcomrade_jni.so" \
              || { echo "::error::missing jniLibs/$abi/libcomrade_jni.so"; exit 1; }
          done

      - name: Install Rust stable
        # Gradle's Kotlin compile tasks depend on generateUniffiBindings
        # (android/app/build.gradle.kts), which builds comrade_jni for the
        # host and runs comrade_uniffi_bindgen — needed even here, on the
        # job that only assembles/signs the release build from the already
        # cross-compiled .so files produced by build-rust above.
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo (host, uniffi bindgen)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-host-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-host-

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        # v4 fixes the cache-save 400s seen on v3. No gradle-version pin: the
        # committed wrapper (android/gradle/wrapper) is the source of truth.
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Install build-tools & platform
        run: |
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Decode signing keystore (optional)
        # Set SIGNING_STORE_B64, SIGNING_KEY_ALIAS, SIGNING_KEY_PASSWORD, and
        # SIGNING_STORE_PASSWORD as repository secrets to get a production-signed
        # APK. Without them the build falls back to the debug key.
        #
        # The conditional lives in the script (not in `if:`) because secrets are
        # only available via `env`/`run`, and a step's own `env` is not visible
        # to its `if:` expression.
        env:
          SIGNING_STORE_B64: ${{ secrets.SIGNING_STORE_B64 }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          # Count how many of the four signing secrets are set. Release signing
          # needs all four together; a partial set is a misconfiguration (e.g.
          # an alias with no keystore makes Gradle try to sign against a missing
          # file), so fail fast instead of half-configuring.
          set_count=0
          for v in "$SIGNING_STORE_B64" "$SIGNING_KEY_ALIAS" "$SIGNING_KEY_PASSWORD" "$SIGNING_STORE_PASSWORD"; do
            [ -n "$v" ] && set_count=$((set_count + 1))
          done
          if [ "$set_count" -eq 4 ]; then
            echo "$SIGNING_STORE_B64" | base64 --decode > android/app/keystore.jks
            echo "Decoded release keystore (production signing)."
          elif [ "$set_count" -eq 0 ]; then
            echo "No signing secrets set — building a debug-signed APK."
          else
            echo "::error::$set_count/4 signing secrets set — provide all four (SIGNING_STORE_B64, SIGNING_KEY_ALIAS, SIGNING_KEY_PASSWORD, SIGNING_STORE_PASSWORD) or none."
            exit 1
          fi

      - name: Validate & normalize version
        # The version comes from workflow_dispatch input. Validate it and expose
        # a sanitized $VERSION so it is never interpolated raw into a shell/tag/
        # filename (a value with spaces or shell metacharacters would break — or
        # inject into — the run steps below).
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          v="${RAW_VERSION#v}"
          if ! printf '%s' "$v" | grep -Eq '^[0-9A-Za-z.-]+$'; then
            echo "::error::invalid version '$RAW_VERSION' — allowed characters: [0-9A-Za-z.-]"
            exit 1
          fi
          echo "VERSION=$v" >> "$GITHUB_ENV"

      - name: Build release APK + App Bundle
        working-directory: android
        env:
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_STORE_FILE: "app/keystore.jks"
        # The .apk is for sideloading (GitHub Releases / Obtainium); the .aab
        # is what Google Play requires for new apps. Same signing config.
        run: |
          ./gradlew assembleRelease bundleRelease \
            -PversionCode="${{ github.run_number }}" \
            -PversionName="$VERSION" \
            --no-daemon

      - name: Rename artifacts
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             "android/app/build/outputs/apk/release/comrade-$VERSION.apk"
          mv android/app/build/outputs/bundle/release/app-release.aab \
             "android/app/build/outputs/bundle/release/comrade-$VERSION.aab"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: comrade-apk-${{ env.VERSION }}
          path: android/app/build/outputs/apk/release/comrade-${{ env.VERSION }}.apk

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: comrade-aab-${{ env.VERSION }}
          path: android/app/build/outputs/bundle/release/comrade-${{ env.VERSION }}.aab

# ── Job 4: Create GitHub Release ──────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build-apk
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Validate & normalize version
        # Re-validate here: this job takes the raw workflow_dispatch input
        # independently of build-apk, and the sanitized value feeds the git tag,
        # the release name, and the artifact/file names.
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          v="${RAW_VERSION#v}"
          if ! printf '%s' "$v" | grep -Eq '^[0-9A-Za-z.-]+$'; then
            echo "::error::invalid version '$RAW_VERSION' — allowed characters: [0-9A-Za-z.-]"
            exit 1
          fi
          echo "VERSION=$v" >> "$GITHUB_ENV"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: comrade-*-${{ env.VERSION }}
          merge-multiple: true
          path: dist/

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ env.VERSION }}
          name: "Comrade v${{ env.VERSION }}"
          prerelease: ${{ inputs.pre_release == 'true' }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/comrade-${{ env.VERSION }}.apk
            dist/comrade-${{ env.VERSION }}.aab
