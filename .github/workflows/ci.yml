name: CI

# Runs on every push to any branch. `pull_request` is intentionally NOT a
# trigger: all PRs come from same-repo branches, so a second trigger would
# only duplicate every run (the audit's O6).
on:
  push:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust — fmt, clippy, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      # comrade_py links against libpython at test time (its `extension-module`
      # feature — required for the real wheel, see crates/comrade_py/Cargo.toml
      # — is off by default precisely so this "cargo test" build can link a
      # normal executable instead of a dlopen-only cdylib).
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked --verbose

      # The desktop ships the media pipeline with the `media-http` feature on,
      # so its guards (HTTPS-only fetch, size cap, ciphertext-hash verify) live
      # behind that feature. Exercise them here or they never run in CI.
      - name: cargo test (media-http)
        run: cargo test -p comrade_core -p comrade_ui --features comrade_ui/media-http --locked

  # The desktop Tauri crate is excluded from the workspace (needs system
  # webview libs), so it gets its own compile+lint lane — without this it is
  # never built by any automated process (audit T2/O1).
  desktop:
    name: Desktop — Tauri shell clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo (desktop)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-desktop-

      - name: cargo clippy (desktop/src-tauri)
        working-directory: desktop/src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

  # JVM unit tests only (voice grammar + dispatcher). No emulator, no APK —
  # compile + test gives most of the signal at a fraction of the cost.
  # APK assembly + on-device (emulator) smoke tests live in android-apk.yml.
  android:
    name: Android — JVM unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        # Gradle's Kotlin compile tasks depend on generateUniffiBindings
        # (android/app/build.gradle.kts), which builds comrade_jni for the
        # host and runs comrade_uniffi_bindgen — needed even for JVM-only
        # unit tests, since they compile against the same `main` sources.
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo (host, uniffi bindgen)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-host-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-host-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install platform & build-tools
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: gradlew test
        working-directory: android
        run: ./gradlew test --no-daemon

  # Builds the real artifact (a maturin wheel) and smoke-tests it in a fresh
  # venv — the "rust" lane's `cargo test -p comrade_py` only covers the pure
  # logic behind the FFI boundary (see that crate's test module comment), so
  # this is what actually proves the compiled `.so` loads and works in
  # Python, mirroring how android-apk.yml smoke-tests the JNI `.so`.
  python:
    name: Python bindings — build wheel + smoke test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-py-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-py-

      - name: Install maturin
        run: pip install "maturin>=1.7,<2.0"

      - name: Build wheel
        working-directory: crates/comrade_py
        run: maturin build --release --locked --out dist

      - name: Install wheel and smoke test
        working-directory: crates/comrade_py
        run: |
          pip install dist/*.whl
          python - <<'PY'
          import tempfile
          import comrade_py

          kp = comrade_py.generate_keypair()
          assert kp["npub"].startswith("npub1"), kp
          assert comrade_py.npub_from_nsec(kp["nsec"]) == kp["npub"]

          client = comrade_py.ComradeClient()
          with tempfile.TemporaryDirectory() as store_dir:
              identity = client.unlock_vault(store_dir, "ci-smoke-test-passphrase")
              assert identity["npub"].startswith("npub1"), identity
              assert client.is_unlocked is True
              assert client.fetch_sabha_timeline() == []
              assert client.conversations() == []

          try:
              client.send_dm("not-a-valid-pubkey", "hi")
              raise SystemExit("send_dm should have rejected an invalid target")
          except comrade_py.ComradeError:
              pass

          print("comrade_py wheel smoke test OK")
          PY

  # COMMS-04 load test: floods the in-process test relay (crates/comrade_ui/
  # tests/support) with ~1000 public events concurrently with a DM, and
  # asserts the DM still arrives within budget and the feed's own memory
  # stays bounded. Marked #[ignore] in the source (so a normal `cargo test`
  # stays fast) and run explicitly here as its own required gate, per
  # AUDIT.md COMMS-03's "make this lane a required release gate".
  load-test:
    name: Rust — COMMS-04 public-feed-flood load test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-loadtest-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-loadtest-

      - name: cargo test -- --ignored (load test)
        run: cargo test -p comrade_ui --test feed_flood_load --locked -- --ignored --nocapture

  # Supply-chain gate: RUSTSEC advisories, duplicate/banned crates, and
  # dependency license allowlist (see deny.toml).
  deny:
    name: Dependencies — cargo-deny
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources licenses
