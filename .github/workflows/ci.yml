name: CI

# Runs on every push to any branch. `pull_request` is intentionally NOT a
# trigger: all PRs come from same-repo branches, so a second trigger would
# only duplicate every run (the audit's O6).
on:
  push:
    branches: ["**"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust — fmt, clippy, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo test
        run: cargo test --workspace --locked --verbose

  # The desktop Tauri crate is excluded from the workspace (needs system
  # webview libs), so it gets its own compile+lint lane — without this it is
  # never built by any automated process (audit T2/O1).
  desktop:
    name: Desktop — Tauri shell clippy
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            pkg-config

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo (desktop)
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            desktop/src-tauri/target
          key: ${{ runner.os }}-cargo-desktop-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-desktop-

      - name: cargo clippy (desktop/src-tauri)
        working-directory: desktop/src-tauri
        run: cargo clippy --all-targets --locked -- -D warnings

  # JVM unit tests only (voice grammar + dispatcher). No emulator, no APK —
  # compile + test gives most of the signal at a fraction of the cost.
  android:
    name: Android — JVM unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install platform & build-tools
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: gradlew test
        working-directory: android
        run: ./gradlew test --no-daemon

  # Supply-chain gate: RUSTSEC advisories, duplicate/banned crates, and
  # dependency license allowlist (see deny.toml).
  deny:
    name: Dependencies — cargo-deny
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources licenses
