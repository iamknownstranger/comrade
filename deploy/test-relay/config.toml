# Minimal nostr-rs-relay config for isolated integration/device testing
# (AUDIT.md COMMS-03) — not a production relay configuration. No auth, no
# rate limiting beyond the defaults, ephemeral by design (the compose file's
# named volume is meant to be thrown away between test runs, not preserved).
#
# Reference: https://github.com/scsibug/nostr-rs-relay/blob/master/config.toml
# (the relay's own documented default — only the fields that matter for
# testing are overridden here).

[info]
relay_url = "ws://localhost:8090/"
name = "comrade-test-relay"
description = "Isolated relay for Comrade integration/device tests — do not use in production"

[network]
address = "0.0.0.0"
port = 8080

[options]
reject_future_seconds = 1800

[limits]
# Generous: the load test (COMMS-04) intentionally floods this relay with
# thousands of events, so it must not itself become the bottleneck being
# measured.
messages_per_sec = 500
max_event_bytes = 262144
