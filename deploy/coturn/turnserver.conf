# coturn configuration for a Comrade TURN relay (AUDIT.md COMMS-02).
#
# Time-limited REST credentials, not static shared ones: `use-auth-secret` +
# `static-auth-secret` is coturn's "TURN REST API" mode — the *secret* below
# lives only on this server (and on an operator-run credential broker that
# calls it; Comrade ships no broker of its own — see README.md), never inside
# the Comrade app. Clients only ever receive a minted, time-limited
# username/password pair (ComradeCore.setTurnServerTyped), so a compromised
# client credential expires instead of being valid forever.
#
# Fill in REPLACE_ME_* before deploying — this file is a template, not a
# secret store; do not commit real values into version control.

listening-port=3478
tls-listening-port=5349

# TLS (turns:) — required for anything beyond a LAN test deployment; a plain
# UDP/TCP-only (turn:) relay is trivially observable/blockable in transit.
# Point these at a real certificate (see README.md's certbot instructions).
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem

# ── Time-limited REST credentials ────────────────────────────────────────────
use-auth-secret
static-auth-secret=REPLACE_ME_WITH_A_LONG_RANDOM_SECRET
realm=REPLACE_ME_WITH_YOUR_DOMAIN

# Never let this relay proxy back into the operator's own private network.
no-loopback-peers
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255

# Reasonable relay-bandwidth ceiling per allocation — tune to your capacity.
max-bps=1000000
total-quota=100

# Never log credentials or relayed packet contents (media is already
# encrypted end-to-end/DTLS-SRTP; coturn only ever forwards ciphertext).
no-stdout-log
syslog
simple-log
