# cargo-deny configuration — supply-chain gate for the workspace.
# Run locally with `cargo deny check`; CI runs it on every push (ci.yml).

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Each ignore must carry a reason and an exit condition. Decision context:
# the project accepts current-framework maturity risk (libp2p) rather than
# migrating — see AUDIT.md §4 "What NOT to fix". `sled`'s live-store role was
# retired in favor of `redb` (AUDIT.md decision log, 2026-07-12); `sled` stays
# only as a one-time legacy-migration reader in `comrade_storage::migrate`, so
# its transitive-dep advisories are still ignored below until that reader is
# removed in a future release (once existing users have all migrated).
ignore = [
    # hickory-proto 0.25.x DNS vulns; fixed only in 0.26, which libp2p 0.56
    # does not yet accept. The affected code is reachable only via the Saathi
    # mDNS mesh, which no frontend currently starts (AUDIT A1).
    # Exit: bump libp2p once it depends on hickory-proto >= 0.26.
    "RUSTSEC-2026-0118",
    "RUSTSEC-2026-0119",
    # Unmaintained transitive deps of accepted frameworks (sled / libp2p /
    # yrs / proc-macro ecosystem). Exit: upstream framework releases drop
    # them, or the sled migration reader itself is removed.
    "RUSTSEC-2025-0057", # fxhash (via sled)
    "RUSTSEC-2024-0384", # instant (via sled's parking_lot)
    "RUSTSEC-2024-0436", # paste (proc-macro, compile-time only)
    # smallstr (via yrs 0.21). Advisory published 2026-07-23 and turned every
    # CI run red from that day (first failing merge: PR #43) — no code change
    # involved. Same accepted-framework rationale as above; yrs's own tracker
    # covers replacing it. Exit: bump yrs once a release drops smallstr.
    "RUSTSEC-2026-0215",
]

[licenses]
version = 2
# The workspace's own crates are private (publish = false) and their license
# is an open owner decision (audit OQ5) — skip them here.
private = { ignore = true }
# Dependency licenses we accept. This governs third-party crates only;
# the project's own license is tracked separately (audit OQ5).
allow = [
    "CDLA-Permissive-2.0", # webpki-roots (Mozilla CA bundle data)
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    "BSL-1.0",
    "Unicode-DFS-2016",
    "Unicode-3.0",
]

[bans]
# The tree already carries duplicate majors (rand 0.8 + 0.9 — audit D4);
# warn rather than deny until that is cleaned up.
multiple-versions = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
